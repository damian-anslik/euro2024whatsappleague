<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 League</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" type="image/png" href="/static/favicon.ico">
</head>

<body>
    <header>
        <div class="header-container">
            <div id="header-left">
                <a href="/">World Cup 2026 Whatsapp League</a>
            </div>
            
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">&#9776;</button>

            <div id="header-right" class="nav-links">
                <a href="/rules">Rules</a>
                {% if request.cookies.get('access_token') %}
                <a href="/logout">Logout</a>
                <a href="/settings">Settings</a>
                {% else %}
                <a href="/login">Login</a>
                <a href="/signup">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script>
        // Toggle mobile menu visibility
        const hamburger = document.getElementById('hamburger-btn');
        const navLinks = document.getElementById('header-right');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
