<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 League</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" type="image/png" href="/static/favicon.ico">
</head>

<body>
    <header>
        <div class="header-container">
            <div id="header-left">
                <a href="/">World Cup 2026 Whatsapp League</a>
            </div>
            
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu"></button>

            <div id="header-right" class="nav-links">
                <a href="/rules">Rules</a>
                {% if request.cookies.get('access_token') %}
                <a href="/settings">Settings</a>
                <a href="/logout">Logout</a>
                {% else %}
                <a href="/login">Login</a>
                <a href="/signup">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <script>
        const hamburger = document.getElementById('hamburger-btn');
        const navLinks = document.getElementById('header-right');
        // Define pixel-perfect SVG icons
        const menuIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>`;
        const closeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
        // Set initial icon
        hamburger.innerHTML = menuIcon;
        // Toggle menu and swap icons
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            hamburger.innerHTML = navLinks.classList.contains('active') ? closeIcon : menuIcon;
        });
    </script>
</body>
</html>
